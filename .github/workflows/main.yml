name: MTR Train Auto Tracker

on:
  schedule:
    # 保持每 15 分鐘一次，但 GitHub 實際執行可能會延遲
    - cron: '*/15 * * * *'
  # 允許手動觸發
  workflow_dispatch:
  # 增加一個觸發點：當你修改程式碼時也會立刻跑一次，測試是否正常
  push:
    branches:
      - main

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    # 確保時區正確
    env:
      TZ: Asia/Hong_Kong
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # 升級到 v4 版本更穩定

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        # 增加超時控制，防止腳本掛起
        run: timeout 600 python "數據儲存檔/tracker.py"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 使用 --allow-empty 防止沒有數據變化時報錯
          git commit -m "自動更新班次統計: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
