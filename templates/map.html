<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港鐵實時地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        .title { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 19px; font-weight: bold; }
        .data-btn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 16px; text-decoration: none; color: black; }
    </style>
</head>
<body>
    <div class="title">🗺️ 港鐵實時地圖 - 荃灣綫</div>
    <a href="/data" class="data-btn">📊 數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.3193, 114.1694], 12);
        var trainMarkers = {};

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 軌道
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E8%B7%AF%E7%B7%9A%E8%BB%8C%E9%81%93%E6%AA%94/Track.TsuenWanLine.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#ed1d24", weight: 5, opacity: 0.75 } }).addTo(map);
            });

        // 車站（使用傳統字符串拼接）
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94/StationLocation_2026_06.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: f => f.properties.StationCode !== "NIL",
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                        radius: 5, color: "#333", fillColor: "#fff", fillOpacity: 0.9, weight: 3
                    }),
                    onEachFeature: function(feature, layer) {
                        var zhName = feature.properties["StationName:zh"] || "未知站";
                        var code = feature.properties.StationCode || "";
                        var popupContent = "<b>" + zhName + "</b> (" + code + ")<br>上行：載入中...<br>下行：載入中...";
                        layer.bindPopup(popupContent);
                    }
                }).addTo(map);
            });

        // 接入 API 顯示列車 (U/D)
        async function updateLiveTrains() {
            try {
                const res = await fetch('/api/live');
                const trains = await res.json();

                Object.values(trainMarkers).forEach(m => map.removeLayer(m));
                trainMarkers = {};

                Object.keys(trains).forEach(id => {
                    const train = trains[id];
                    // 暫時模擬位置
                    const lat = 22.28 + (train.progress || 0.3) * 0.1;
                    const lng = 114.15 + (train.progress || 0.3) * 0.08;

                    const isUp = train.direction === "UP";
                    const label = isUp ? "U" : "D";
                    const color = isUp ? "#ef4444" : "#f59e0b";

                    var marker = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: '',
                            html: `<div style="background:\( {color};color:white;width:18px;height:18px;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,0.3);"> \){label}</div>`,
                            iconSize: [18, 18],
                            iconAnchor: [9, 9]
                        })
                    }).addTo(map);

                    marker.bindPopup(`<b>列車 ${label}</b><br>往 ${train.dest}<br>方向: ${train.direction}`);

                    trainMarkers[id] = marker;
                });
            } catch (e) {
                console.error("更新列車失敗", e);
            }
        }

        setInterval(updateLiveTrains, 7000);
        updateLiveTrains();
    </script>
</body>
</html>
