<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港鐵實時地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        .title { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 19px; font-weight: bold; }
        .data-btn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 16px; text-decoration: none; color: black; }
    </style>
</head>
<body>
    <div class="title">🗺️ 港鐵實時地圖 - 荃灣綫</div>
    <a href="/data" class="data-btn">📊 數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.3193, 114.1694], 12);
        var trainMarker = null;
        var trackCoords = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 載入軌道
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E8%B7%AF%E7%B7%9A%E8%BB%8C%E9%81%93%E6%AA%94/Track.TsuenWanLine.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#ed1d24", weight: 5, opacity: 0.75 } }).addTo(map);

                data.features.forEach(f => {
                    if (f.geometry.type === "LineString") {
                        trackCoords = trackCoords.concat(f.geometry.coordinates);
                    }
                });
                console.log("軌道載入完成，共", trackCoords.length, "個點");
            });

        // 車站
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94/StationLocation_2026_06.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: f => f.properties.StationCode !== "NIL",
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                        radius: 5, color: "#333", fillColor: "#fff", fillOpacity: 0.9, weight: 3
                    }),
                    onEachFeature: function(feature, layer) {
                        var zhName = feature.properties["StationName:zh"] || "未知站";
                        var code = feature.properties.StationCode || "";
                        layer.bindPopup(`<b>\( {zhName} ( \){code})</b><br>上行：載入中...<br>下行：載入中...`);
                    }
                }).addTo(map);
            });

        // 高平滑度移動
        function startTrainMovement() {
            if (trainMarker) map.removeLayer(trainMarker);

            let currentIndex = 0;
            let subProgress = 0;

            function moveTrain() {
                if (trackCoords.length < 50) return;

                subProgress += 0.08;   // 控制速度，數字越大越快
                if (subProgress >= 1) {
                    subProgress = 0;
                    currentIndex = (currentIndex + 1) % (trackCoords.length - 1);
                }

                const p1 = trackCoords[currentIndex];
                const p2 = trackCoords[currentIndex + 1];

                const lat = p1[1] + (p2[1] - p1[1]) * subProgress;
                const lng = p1[0] + (p2[0] - p1[0]) * subProgress;

                if (!trainMarker) {
                    trainMarker = L.circleMarker([lat, lng], {
                        radius: 8,
                        color: "#ffffff",
                        fillColor: "#ef4444",
                        fillOpacity: 1,
                        weight: 3.5
                    }).addTo(map);
                } else {
                    trainMarker.setLatLng([lat, lng]);
                }
            }

            setInterval(moveTrain, 50);   // 每50毫秒更新一次，非常平滑
            moveTrain();
        }

        setTimeout(startTrainMovement, 2000);
    </script>
</body>
</html>
