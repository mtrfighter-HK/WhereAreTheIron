<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 實時列車地圖 - 手機調試版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; background: #ffffff; }
        .nav-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; border: 2px solid #ccc; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; text-decoration: none; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-btn:hover { background: #eee; }
        
        /* 📱 手機專用實時日誌面板樣式 */
        #debug-panel {
            position: absolute; bottom: 10px; left: 10px; width: calc(100% - 40px); max-height: 120px;
            background: rgba(0, 0, 0, 0.85); color: #00ff00; font-family: monospace; font-size: 11px;
            padding: 8px; border-radius: 5px; overflow-y: auto; z-index: 2000; pointer-events: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); line-height: 1.4;
        }
        .log-err { color: #ff4d4d; font-weight: bold; }
        .log-succ { color: #52c41a; }
        .log-warn { color: #faad14; }

        .station-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #111111; font-weight: bold; text-shadow: 1px 1px 2px #ffffff; font-size: 12px;
        }
        .leaflet-tooltip-left::before, .leaflet-tooltip-right::before,
        .leaflet-tooltip-top::before, .leaflet-tooltip-bottom::before { display: none !important; }

        .mtr-train-container {
            width: 14px !important; height: 14px !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
            pointer-events: none !important; background: transparent !important; border: none !important;
        }
        .mtr-dynamic-train {
            width: 10px !important; height: 10px !important;
            background-color: #ffffff !important; border-radius: 50% !important;
            box-sizing: border-box !important; box-shadow: 0 0 5px rgba(0,0,0,0.6) !important;
            display: block;
        }
    </style>
</head>
<body>

    <a href="/admin" class="nav-btn">📊 前往數據後台</a>
    
    <div id="debug-panel">📱 系統日誌初始化中...<br></div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 🔍 在手機螢幕印出日誌的工具函式
        function screenLog(msg, type = 'info') {
            const panel = document.getElementById('debug-panel');
            if (!panel) return;
            let cssClass = '';
            if (type === 'error') cssClass = 'class="log-err"';
            if (type === 'success') cssClass = 'class="log-succ"';
            if (type === 'warn') cssClass = 'class="log-warn"';
            
            // 限制最多顯示 30 行，防止手機卡頓
            const lines = panel.innerHTML.split('<br>');
            if (lines.length > 30) lines.shift();
            
            panel.innerHTML = lines.join('<br>') + `<span ${cssClass}>[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
            panel.scrollTop = panel.scrollHeight; // 自動捲動到最底
        }

        // 全域捕捉未處理的 JS 錯誤並彈出到螢幕
        window.onerror = function(message, source, lineno, colno, error) {
            screenLog(`崩潰全局錯誤: ${message} (第${lineno}行)`, 'error');
            return false;
        };

        var map = L.map('map').setView([22.321, 114.170], 12.0);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        map.createPane('trackPane').style.zIndex = 450;   
        map.createPane('trainPane').style.zIndex = 550; 
        map.createPane('stationPane').style.zIndex = 600; 

        var stationCoords = {}; 
        var stationLayers = {}; 
        var stationLineMapping = {}; 
        var trackFeatures = []; 
        var travelTimeConfig = {}; 
        var lastStationState = {}; 
        var activeTrains = {}; 

        const LINE_COLORS = { "TWL": "#E2231A", "TKL": "#7A2682" };

        // 1. 核心異步載入流程
        async function initApp() {
            screenLog("開始載入基礎 GeoJSON 數據...", "info");

            // A. 車站
            try {
                const res = await fetch('/系統基本檔/StationLocation_2026_06.geojson');
                const stationData = await res.json();
                L.geoJSON(stationData, {
                    filter: f => (f.properties.StationCode || f.properties.station_code || "") !== "NIL",
                    pointToLayer: function (feature, latlng) {
                        var props = feature.properties;
                        var staCode = (props.StationCode || props.station_code || "").toUpperCase().trim();
                        var rawLine = props.Line || props.line || "TWL";
                        var lineArr = String(rawLine).split(',').map(s => s.trim().toUpperCase());
                        
                        stationCoords[staCode] = [latlng.lat, latlng.lng];
                        stationLineMapping[staCode] = lineArr;

                        var outerMarker = L.circleMarker(latlng, { radius: 5, color: '#000000', fillColor: '#ffffff', fillOpacity: 1, weight: 2.0, pane: 'stationPane' }).addTo(map);
                        L.circleMarker(latlng, { radius: 1.5, color: '#ffffff', fillColor: '#ffffff', fillOpacity: 1, weight: 1, pane: 'stationPane' }).addTo(map);
                        stationLayers[staCode] = outerMarker; 
                        return outerMarker; 
                    },
                    onEachFeature: function (feature, layer) {
                        var props = feature.properties;
                        var staName = props["StationName:zh"] || props["station_name:zh"] || "未知";
                        if (staName.endsWith("站")) staName = staName.slice(0, -1);
                        layer.bindTooltip(staName, { permanent: true, direction: 'right', className: 'station-label', offset: [10, 0] });
                        layer.bindPopup(`<b>${staName}</b>`);
                    }
                }).addTo(map);
                screenLog("車站地圖繪製成功", "success");
            } catch (e) { screenLog("車站加載失敗: " + e.message, "error"); }

            // B. 荃灣線軌道
            try {
                const res = await fetch('/路線軌道檔/Track.TsuenWanLine.geojson');
                const twlTrack = await res.json();
                trackFeatures.push(...twlTrack.features);
                L.geoJSON(twlTrack, { style: { color: LINE_COLORS['TWL'], weight: 4, opacity: 0.8 }, pane: 'trackPane' }).addTo(map);
                screenLog(`荃灣線軌道載入成功 (${twlTrack.features.length}段)`, "success");
            } catch (e) { screenLog("荃灣線軌道失敗: " + e.message, "error"); }

            // C. 將軍澳線軌道
            try {
                const res = await fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E8%B7%AF%E7%B7%9A%E8%BB%8C%E9%81%93%E6%AA%94%2FTrack.TseungKwanOLine.geojson');
                const tklTrack = await res.json();
                trackFeatures.push(...tklTrack.features);
                L.geoJSON(tklTrack, { style: { color: LINE_COLORS['TKL'], weight: 4, opacity: 0.8 }, pane: 'trackPane' }).addTo(map);
                screenLog(`將軍澳線軌道載入成功 (${tklTrack.features.length}段)`, "success");
            } catch (e) { screenLog("將軍澳線軌道失敗: " + e.message, "error"); }

            // D. 行車時間
            try {
                const res = await fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94%2FTravelTimeConfig.json');
                const timeConfig = await res.json();
                if (timeConfig && timeConfig.travel_times) {
                    timeConfig.travel_times.forEach(t => {
                        travelTimeConfig[`${t.from.toUpperCase()}_${t.to.toUpperCase()}`] = t.run_time_sec || t.duration_sec || 120; 
                    });
                }
                screenLog("行車時間配置加載成功", "success");
            } catch (e) { screenLog("時間配置載入跳過", "warn"); }

            // 啟動實時數據輪詢
            processTrainSchedules();
            setInterval(processTrainSchedules, 6000); 
            screenLog("實時列車調度器已啟動(每6秒刷新)", "info");
        }

        // 2. 實時列車數據處理與調度
        function processTrainSchedules() {
            fetch('/api/live')
                .then(res => res.json())
                .then(response => {
                    if (response.status !== "success") {
                        screenLog("API 回傳失敗狀態", "warn");
                        return;
                    }
                    var trainData = response.data;
                    if(!trainData || trainData.length === 0) {
                        screenLog("API 活數據為空陣列", "warn");
                        return;
                    }

                    var currentGroup = {};
                    var stationSchedules = {};

                    // 🎯 使用 try-catch 保護外層遍歷，確保其中一班車出事不會全盤崩潰
                    trainData.forEach(train => {
                        try {
                            var line = (train.line || "").toUpperCase().trim();
                            if (line !== "TWL" && line !== "TKL") return; 

                            var currentSta = (train.station || "").toUpperCase().trim();
                            var dir = (train.direction || "").toUpperCase().trim();
                            var key = `${line}_${currentSta}_${dir}`; 

                            if (!stationSchedules[currentSta]) stationSchedules[currentSta] = [];
                            stationSchedules[currentSta].push(train);

                            if (!currentGroup[key] || parseInt(train.ttnt) < parseInt(currentGroup[key].ttnt)) {
                                currentGroup[key] = train; 
                            }
                        } catch(err) { screenLog("分組數據出錯: " + err.message, "error"); }
                    });

                    let spawnedCount = 0;

                    Object.keys(currentGroup).forEach(key => {
                        try {
                            var currentTrain = currentGroup[key];
                            var lastTrain = lastStationState[key];

                            var line = currentTrain.line.toUpperCase().trim();
                            var currentTtnt = parseInt(currentTrain.ttnt);
                            var currentSta = currentTrain.station.toUpperCase().trim(); 
                            var dir = currentTrain.direction.toUpperCase().trim();
                            var dest = currentTrain.dest || "";

                            var prevSta = getPreviousStation(currentSta, dir, line, dest); 
                            if (!prevSta) {
                                // 🔍 如果算不出上一個站，喺畫面上印出提示協助排查
                                if(line === "TKL") {
                                    console.log(`邊界無前站: 站=${currentSta}, 方向=${dir}, 目的地=${dest}`);
                                }
                                return; 
                            } 

                            var trainId = `${line}_${dir}_${prevSta}_${currentSta}`;

                            if (lastTrain) {
                                var lastTtnt = parseInt(lastTrain.ttnt);
                                if ((lastTtnt === 0 && currentTtnt > 0) || (isTerminus(currentSta, dir, line) && currentTtnt > lastTtnt)) {
                                    clearPreviousBlockTrain(prevSta, dir, line);
                                    if(launchVirtualTrain(prevSta, currentSta, dir, currentTrain.dest, line)) spawnedCount++;
                                }
                            } else {
                                if (!activeTrains[trainId]) {
                                    if (currentTtnt >= 1 && currentTtnt <= 4) {
                                        if(launchVirtualTrain(prevSta, currentSta, dir, currentTrain.dest, line)) spawnedCount++;
                                    }
                                }
                            }

                            if (activeTrains[trainId]) {
                                var runningTrain = activeTrains[trainId];
                                if (currentTtnt === 0 && !runningTrain.inCompensationZone) {
                                    runningTrain.enterCompensation(runningTrain.ratio); 
                                }
                            }
                            lastStationState[key] = currentTrain;
                        } catch(err) { screenLog("核心邏輯執行異常: " + err.message, "error"); }
                    });

                    if(spawnedCount > 0) {
                        screenLog(`🔄 調度完成：本次刷新生成 ${spawnedCount} 班行駛列車點`, "success");
                    }

                    // 更新車站 Popup
                    Object.keys(stationLayers).forEach(staCode => {
                        var marker = stationLayers[staCode];
                        var schedules = stationSchedules[staCode] || [];
                        var tooltip = marker.getTooltip();
                        var staName = tooltip ? tooltip.getContent() : staCode;

                        var popupContent = `<b>${staName} (${staCode})</b><br><hr style="border:0;border-top:1px solid #ccc;margin:5px 0;">`;
                        if (schedules.length === 0) {
                            popupContent += `<span style="color:#888;font-size:12px;">暫無實時列車數據</span>`;
                        } else {
                            var linesInStation = stationLineMapping[staCode] || ["TWL"];
                            linesInStation.forEach(l => {
                                var lineScheds = schedules.filter(t => (t.line || "").toUpperCase().trim() === l);
                                if (lineScheds.length === 0) return;

                                var cColor = LINE_COLORS[l] || "#000000";
                                popupContent += `<div style="font-weight:bold;color:${cColor};font-size:12px;margin-top:5px;">● ${l === 'TWL' ? '荃灣線' : '將軍澳線'}:</div>`;
                                
                                var dirs = [...new Set(lineScheds.map(t => (t.direction || "").toUpperCase().trim()))];
                                dirs.forEach(d => {
                                    var dirScheds = lineScheds.filter(t => (t.direction || "").toUpperCase().trim() === d).sort((a,b) => parseInt(a.ttnt) - parseInt(b.ttnt));
                                    if (dirScheds.length > 0) {
                                        var firstTrain = dirScheds[0];
                                        var ttntVal = parseInt(firstTrain.ttnt);
                                        var ttntText = (ttntVal === 0) ? `<span style="color:green;font-weight:bold;">進站中</span>` : `<span style="color:${cColor};font-weight:bold;">${ttntVal}</span> 分鐘`;
                                        popupContent += `<div style="font-size:12px;margin-left:8px;">• 往 ${firstTrain.dest}: ${ttntText}</div>`;
                                    }
                                });
                            });
                        }
                        marker.setPopupContent(popupContent);
                    });
                }).catch(err => screenLog("請求 /api/live 失敗: " + err.message, "error"));
        }

        function clearPreviousBlockTrain(currentLaunchStation, direction, line) {
            var oppDir = (direction === "UP") ? "DOWN" : "UP";
            var prevPrevSta = getPreviousStation(currentLaunchStation, oppDir, line, ""); 
            if (!prevPrevSta) return;
            var oldTrainId = `${line}_${direction}_${prevPrevSta}_${currentLaunchStation}`;
            if (activeTrains[oldTrainId]) activeTrains[oldTrainId].destroy();
        }

           // 3. 虛擬列車移動渲染器
        class VirtualTrain {
            constructor(fromSta, toSta, direction, dest, line) {
                this.fromSta = fromSta;
                this.toSta = toSta;
                this.direction = direction;
                this.dest = dest;
                this.line = line;
                this.id = `${line}_${direction}_${fromSta}_${toSta}`;
                this.success = false;

                var geojsonDataDir = (direction === "UP") ? "UP" : "DOWN";
                
                // 比對軌道
                this.trackFeature = trackFeatures.find(f => {
                    var props = f.properties || {};
                    // 🌟 這裡加上了 props.ref，完美對接你的 GeoJSON 格式！
                    var fLine = (props.ref || props.line || props.Line || "").toUpperCase().trim();
                    var fDir = (props.direction || props.Direction || "").toUpperCase().trim();
                    var fFrom = (props.from || props.From || "").toUpperCase().trim();
                    var fTo = (props.to || props.To || "").toUpperCase().trim();
                    return fLine === line && fDir === geojsonDataDir && fFrom === fromSta && fTo === toSta;
                });

                if (!this.trackFeature) {
                    screenLog(`❌ 軌道匹配失敗: ${line} | ${geojsonDataDir} | ${fromSta}➔${toSta}`, "error");
                    return;
                }
                
                this.coords = this.trackFeature.geometry.coordinates;
                this.spatialData = precomputeTrackDistances(this.coords);
                var timeKey = `${fromSta}_${toSta}`;
                this.totalDuration = (travelTimeConfig[timeKey] || 110) * 1000; 

                this.startTime = Date.now();
                this.ratio = 0.0;
                this.inCompensationZone = false;
                this.timer = null;

                var trainBorderColor = LINE_COLORS[line] || "#E2231A";
                this.iconElement = L.divIcon({ 
                    className: 'mtr-train-container', 
                    html: `<div class="mtr-dynamic-train" style="border: 2px solid ${trainBorderColor} !important;"></div>`, 
                    iconSize: [14, 14], iconAnchor: [7, 7] 
                });

                this.marker = L.marker(this.spatialData.points[0], { icon: this.iconElement, pane: 'trainPane' }).addTo(map);
                this.updatePopupText("自動巡航中");
                this.startCruise();
                this.success = true;
            }
            // ... 底下保持不變 ...

            updatePopupText(statusHtml) {
                this.marker.bindPopup(`<b>路線:</b> ${this.line}<br><b>目的地:</b> ${this.dest}<br><b>區間:</b> ${this.fromSta} ➔ ${this.toSta}<br><b>狀態:</b> ${statusHtml}`);
            }

            startCruise() {
                if (this.timer) clearInterval(this.timer);
                this.startTime = Date.now();
                this.timer = setInterval(() => {
                    var elapsed = Date.now() - this.startTime;
                    this.ratio = Math.min(1.0, elapsed / this.totalDuration);
                    var latlng = interpolateByTrueDistance(this.spatialData, this.ratio);
                    if (latlng) this.marker.setLatLng(latlng);
                    if (this.ratio >= 1.0) { clearInterval(this.timer); this.arrive(); }
                }, 1000);
            }

            enterCompensation(startRatio = 0.0) {
                this.inCompensationZone = true;
                if (this.timer) clearInterval(this.timer);
                this.ratio = startRatio;
                var compStartTime = Date.now();
                this.updatePopupText("正在減速進站...");
                this.timer = setInterval(() => {
                    var elapsed = Date.now() - compStartTime;
                    this.ratio = startRatio + (1.0 - startRatio) * (elapsed / 6000); 
                    if (this.ratio >= 1.0) {
                        clearInterval(this.timer);
                        this.marker.setLatLng(this.spatialData.points[this.spatialData.points.length - 1]);
                        this.arrive(); 
                    } else {
                        var latlng = interpolateByTrueDistance(this.spatialData, this.ratio);
                        if (latlng) this.marker.setLatLng(latlng);
                    }
                }, 200); 
            }

            arrive() {
                this.updatePopupText("<span style='color:green;font-weight:bold;'>列車已進站</span>");
                if (isTerminus(this.toSta, this.direction, this.line)) {
                    setTimeout(() => { this.destroy(); }, 15000);
                }
            }

            destroy() {
                if (this.timer) clearInterval(this.timer);
                if (this.marker) map.removeLayer(this.marker);
                delete activeTrains[this.id];
            }
        }

        function precomputeTrackDistances(coords) {
            var points = coords.map(c => [c[1], c[0]]);
            var distances = [0]; var totalDist = 0;
            for (var i = 0; i < points.length - 1; i++) {
                totalDist += L.latLng(points[i]).distanceTo(L.latLng(points[i+1]));
                distances.push(totalDist);
            }
            return { points: points, distances: distances, totalDistance: totalDist };
        }

        function interpolateByTrueDistance(spatialData, ratio) {
            var targetDist = spatialData.totalDistance * ratio;
            var dists = spatialData.distances; var pts = spatialData.points;
            if (targetDist <= 0) return pts[0];
            if (targetDist >= spatialData.totalDistance) return pts[pts.length - 1];
            for (var i = 0; i < dists.length - 1; i++) {
                if (targetDist >= dists[i] && targetDist <= dists[i+1]) {
                    var segRatio = (targetDist - dists[i]) / (dists[i+1] - dists[i]);
                    return [pts[i][0] + (pts[i+1][0] - pts[i][0]) * segRatio, pts[i][1] + (pts[i+1][1] - pts[i][1]) * segRatio];
                }
            }
            return pts[pts.length - 1];
        }

        function launchVirtualTrain(fromSta, toSta, dir, dest, line) {
            var trainId = `${line}_${dir}_${fromSta}_${toSta}`;
            if (activeTrains[trainId]) activeTrains[trainId].destroy();
            var vt = new VirtualTrain(fromSta, toSta, dir, dest, line);
            if(vt.success) {
                activeTrains[trainId] = vt;
                return true;
            }
            return false;
        }

        const TWL_ORDER = ["CEN", "ADM", "TST", "JOR", "YMT", "MOK", "PRE", "SSP", "CSW", "LCK", "MEF", "LAK", "KWF", "KWH", "TWH", "TSW"];

        function getPreviousStation(nextSta, direction, line, dest) {
            nextSta = nextSta.toUpperCase().trim();
            direction = direction.toUpperCase().trim();
            line = line.toUpperCase().trim();

            if (line === "TWL") {
                var index = TWL_ORDER.indexOf(nextSta); if (index === -1) return null;
                return (direction === 'UP') ? (index > 0 ? TWL_ORDER[index - 1] : null) : (index < TWL_ORDER.length - 1 ? TWL_ORDER[index + 1] : null);
            }
            
            if (line === "TKL") {
                if (direction === "DOWN") {
                    if (nextSta === "HAH") return "POA";
                    if (nextSta === "LHP") return null; 
                    if (nextSta === "TKO") {
                        if (dest && dest.includes("康城")) return "LHP"; 
                        return "HAH"; 
                    }
                    if (nextSta === "TIK") return "TKO";
                    if (nextSta === "YAT") return "TIK";
                    if (nextSta === "QUB") return "YAT";
                    if (nextSta === "NOP") return "QUB";
                }
                
                if (direction === "UP") {
                    if (nextSta === "QUB") return "NOP";
                    if (nextSta === "YAT") return "QUB";
                    if (nextSta === "TIK") return "YAT";
                    if (nextSta === "TKO") return "TIK";
                    if (nextSta === "HAH") return "TKO";
                    if (nextSta === "POA") return "HAH";
                    if (nextSta === "LHP") return "TKO"; 
                }
            }
            return null;
        }

        function isTerminus(sta, dir, line) {
            sta = sta.toUpperCase().trim(); dir = dir.toUpperCase().trim(); line = line.toUpperCase().trim();
            if (line === "TWL") return (dir === "UP" && sta === "TSW") || (dir === "DOWN" && sta === "CEN");
            if (line === "TKL") return (dir === "UP" && (sta === "POA" || sta === "LHP")) || (dir === "DOWN" && sta === "NOP");
            return false;
        }

        initApp();
    </script>
</body>
</html>
