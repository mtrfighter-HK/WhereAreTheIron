<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港鐵實時地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        .title { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 19px; font-weight: bold; }
        .back-btn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 17px; text-decoration: none; color: black; }
        .leaflet-popup-content { font-size: 15.5px !important; line-height: 1.6; min-width: 220px; }
    </style>
</head>
<body>
    <div class="title">🗺️ 港鐵實時地圖</div>
    <a href="/" class="back-btn">← 返回主頁</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.3193, 114.1694], 12);
        var trainMarkers = [];
        var twlLineCoords = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 軌道 + 儲存坐標
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E8%B7%AF%E7%B7%9A%E8%BB%8C%E9%81%93%E6%AA%94/Track.TsuenWanLine.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#ed1d24", weight: 5, opacity: 0.7 }
                }).addTo(map);

                // 儲存所有坐標點
                data.features.forEach(f => {
                    if (f.geometry.type === "LineString") {
                        twlLineCoords = twlLineCoords.concat(f.geometry.coordinates);
                    }
                });
                console.log("軌道坐標載入完成，共", twlLineCoords.length, "點");
            });

        // 車站點
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94/StationLocation_2026_06.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: f => f.properties.StationCode !== "NIL",
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                        radius: 5, color: "#333", fillColor: "#fff", fillOpacity: 0.9, weight: 3
                    }),
                    onEachFeature: function(feature, layer) {
                        var zhName = feature.properties["StationName:zh"] || "未知站";
                        var code = feature.properties.StationCode || "";
                        layer.bindPopup(`<b>\( {zhName} ( \){code})</b><br>上行：載入中...<br>下行：載入中...`);
                    }
                }).addTo(map);
            });

        // ==================== 列車沿軌道移動 ====================
        function moveTrains() {
            trainMarkers.forEach(m => map.removeLayer(m));
            trainMarkers = [];

            if (twlLineCoords.length < 50) return;

            const total = twlLineCoords.length;
            const positions = [0.1, 0.4, 0.65, 0.85]; // 4個列車

            positions.forEach(progress => {
                const idx = Math.floor(progress * (total - 1));
                const coord = twlLineCoords[idx];
                if (coord) {
                    var marker = L.circleMarker([coord[1], coord[0]], {
                        radius: 7,
                        color: "#ffffff",
                        fillColor: "#ef4444",
                        fillOpacity: 1,
                        weight: 3
                    }).addTo(map);
                    trainMarkers.push(marker);
                }
            });
        }

        // 每 4 秒移動一次
        setInterval(moveTrains, 4000);
        
        // 等待軌道載入後開始移動
        setTimeout(moveTrains, 3000);
    </script>
</body>
</html>
