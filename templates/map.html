<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港鐵實時地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        .title { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 19px; font-weight: bold; }
        .data-btn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 16px; text-decoration: none; color: black; }
    </style>
</head>
<body>
    <div class="title">🗺️ 港鐵實時地圖 - 荃灣綫 [MAP-v3.1]</div>
    <a href="/data" class="data-btn">📊 數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.3193, 114.1694], 12);
        var trainMarker = null;
        var trackCoords = [];
        var distances = [];
        var totalDistance = 0;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 軌道
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E8%B7%AF%E7%B7%9A%E8%BB%8C%E9%81%93%E6%AA%94/Track.TsuenWanLine.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#ed1d24", weight: 5, opacity: 0.75 } }).addTo(map);

                data.features.forEach(f => {
                    if (f.geometry.type === "LineString") {
                        trackCoords = trackCoords.concat(f.geometry.coordinates);
                    }
                });

                // 計算累積距離（解決速度不均）
                let cum = 0;
                distances = [0];
                for (let i = 1; i < trackCoords.length; i++) {
                    const dx = trackCoords[i][0] - trackCoords[i-1][0];
                    const dy = trackCoords[i][1] - trackCoords[i-1][1];
                    cum += Math.sqrt(dx*dx + dy*dy);
                    distances.push(cum);
                }
                totalDistance = cum || 1;
            });

        // 車站
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94/StationLocation_2026_06.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: f => f.properties.StationCode !== "NIL",
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                        radius: 5, color: "#333", fillColor: "#fff", fillOpacity: 0.9, weight: 3
                    }),
                    onEachFeature: function(feature, layer) {
                        var zhName = feature.properties["StationName:zh"] || "未知站";
                        var code = feature.properties.StationCode || "";
                        var content = "<b>" + zhName + "</b> (" + code + ")<br>上行：載入中...<br>下行：載入中...";
                        layer.bindPopup(content);
                    }
                }).addTo(map);
            });

        // 恆速移動
        function startTrainMovement() {
            if (trainMarker) map.removeLayer(trainMarker);

            function moveTrain() {
                if (trackCoords.length < 50 || totalDistance === 0) return;

                const cycleTime = 28000; // 28秒走完整條線
                const progress = (Date.now() % cycleTime) / cycleTime;
                const targetDist = progress * totalDistance;

                let i = 0;
                while (i < distances.length - 1 && distances[i+1] < targetDist) i++;

                const ratio = (targetDist - distances[i]) / (distances[i+1] - distances[i]);
                const p1 = trackCoords[i];
                const p2 = trackCoords[i + 1];

                const lat = p1[1] + (p2[1] - p1[1]) * ratio;
                const lng = p1[0] + (p2[0] - p1[0]) * ratio;

                if (!trainMarker) {
                    trainMarker = L.circleMarker([lat, lng], {
                        radius: 8,
                        color: "#ffffff",
                        fillColor: "#ef4444",
                        fillOpacity: 1,
                        weight: 3.5
                    }).addTo(map);
                } else {
                    trainMarker.setLatLng([lat, lng]);
                }
            }

            setInterval(moveTrain, 80);
            moveTrain();
        }

        setTimeout(startTrainMovement, 2500);
    </script>
</body>
</html>
