<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 實時列車地圖 - 訊號閉塞修正版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; background: #ffffff; }
        .nav-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; border: 2px solid #ccc; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; text-decoration: none; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-btn:hover { background: #eee; }
        .station-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #111111; font-weight: bold; text-shadow: 1px 1px 2px #ffffff; font-size: 12px;
        }
        .leaflet-tooltip-left::before, .leaflet-tooltip-right::before,
        .leaflet-tooltip-top::before, .leaflet-tooltip-bottom::before { display: none !important; }

        .train-container { width: 10px; height: 10px; display: flex; align-items: center; justify-content: center; }
        .train-dot { width: 8px; height: 8px; background-color: #ffffff; border: 2px solid #E2231A; border-radius: 50%; box-shadow: 0 0 3px rgba(0,0,0,0.3); }
        .train-dot-delayed {
            width: 8px; height: 8px; background-color: #ffcc00; border: 2px solid #cc9900; border-radius: 50%; box-shadow: 0 0 8px #ffcc00;
            animation: mtrTrainPulse 0.8s infinite alternate;
        }
        @keyframes mtrTrainPulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

    <a href="/admin" class="nav-btn">📊 前往數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 🟢 確保 Leaflet 最優先初始化，就算後面 fetch 失敗，底圖也絕對會出來
        var map = L.map('map').setView([22.321, 114.170], 12.5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        map.createPane('trackPane').style.zIndex = 450;   
        map.createPane('stationPane').style.zIndex = 500; 
        map.createPane('trainPane').style.zIndex = 550;   

        var stationCoords = {}; 
        var stationLayers = {}; 
        var trackFeatures = []; 
        var travelTimeConfig = {}; 
        var lastStationState = {}; 
        var activeTrains = {}; 

        // 🟢 幫每個 Fetch 加上個體安全網，防止任何一個檔案不見導致全盤崩潰
        Promise.all([
            fetch('/路線軌道檔/Track.TsuenWanLine.geojson').then(res => res.ok ? res.json() : null).catch(() => null),
            fetch('/系統基本檔/StationLocation_2026_06.geojson').then(res => res.ok ? res.json() : null).catch(() => null),
            fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC
