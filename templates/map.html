<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港鐵實時地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        .title { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 19px; font-weight: bold; }
        .data-btn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 16px; text-decoration: none; color: black; }
        .leaflet-popup-content { font-size: 16px !important; min-width: 220px; }
    </style>
</head>
<body>
    <div class="title">🗺️ 港鐵實時地圖 - 荃灣綫</div>
    <a href="/data" class="data-btn">📊 數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.3193, 114.1694], 12);
        var trainMarkers = [];
        var twlCoords = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 載入軌道 + 儲存坐標
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E8%B7%AF%E7%B7%9A%E8%BB%8C%E9%81%93%E6%AA%94/Track.TsuenWanLine.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#ed1d24", weight: 5, opacity: 0.75 } }).addTo(map);
                
                data.features.forEach(f => {
                    if (f.geometry.type === "LineString") {
                        twlCoords = twlCoords.concat(f.geometry.coordinates);
                    }
                });
                console.log("軌道載入完成，共 " + twlCoords.length + " 點");
            });

        // 載入車站
        fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94/StationLocation_2026_06.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: f => f.properties.StationCode !== "NIL",
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                        radius: 5, color: "#333", fillColor: "#fff", fillOpacity: 0.9, weight: 3
                    }),
                    onEachFeature: function(feature, layer) {
                        var zhName = feature.properties["StationName:zh"] || "未知站";
                        var code = feature.properties.StationCode || "";
                        // 使用傳統字符串拼接，避免模板字面量問題
                        var popupContent = "<b>" + zhName + "</b> (" + code + ")<br>上行：載入中...<br>下行：載入中...";
                        layer.bindPopup(popupContent);
                    }
                }).addTo(map);
            });

        // 列車沿軌道移動
        function moveTrains() {
            trainMarkers.forEach(m => map.removeLayer(m));
            trainMarkers = [];

            if (twlCoords.length < 100) return;

            const total = twlCoords.length;
            const positions = [0.15, 0.45, 0.70, 0.88];

            positions.forEach(p => {
                const idx = Math.floor(p * (total - 1));
                const coord = twlCoords[idx];
                if (coord) {
                    var marker = L.circleMarker([coord[1], coord[0]], {
                        radius: 8,
                        color: "#ffffff",
                        fillColor: "#ef4444",
                        fillOpacity: 1,
                        weight: 3.5
                    }).addTo(map);
                    trainMarkers.push(marker);
                }
            });
        }

        setInterval(moveTrains, 3500);
        setTimeout(moveTrains, 2000);   // 提早第一次顯示
    </script>
</body>
</html>
