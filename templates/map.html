<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 實時列車地圖 - 荃灣綫</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; background: #ffffff; }
        .nav-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; border: 2px solid #ccc; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; text-decoration: none; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-btn:hover { background: #eee; }
        .station-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #111111; font-weight: bold; text-shadow: 1px 1px 2px #ffffff; font-size: 12px;
        }
        .leaflet-tooltip-left::before, .leaflet-tooltip-right::before,
        .leaflet-tooltip-top::before, .leaflet-tooltip-bottom::before { display: none !important; }
        .train-icon {
            background-color: #ffffff; border: 2px solid #E2231A; border-radius: 50%; box-shadow: 0 0 3px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <a href="/admin" class="nav-btn">📊 前往數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.321, 114.170], 12.5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        map.createPane('trackPane').style.zIndex = 450;   
        map.createPane('stationPane').style.zIndex = 500; 
        map.createPane('trainPane').style.zIndex = 550;   

        var stationCoords = {}; 
        var stationLayers = {}; 
        var trainMarkers = {};

        // 3. 載入軌道線
        fetch('/路線軌道檔/Track.TsuenWanLine.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                L.geoJSON(geojsonData, { 
                    style: { color: '#E2231A', weight: 5, opacity: 0.9 },
                    pane: 'trackPane'
                }).addTo(map);
            });

        // 4. 載入車站點
        fetch('/系統基本檔/StationLocation_2026_06.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                L.geoJSON(geojsonData, {
                    filter: function(feature) {
                        var props = feature.properties;
                        var code = props.StationCode || props.station_code || "";
                        // 【功能 1】：完美過濾「NIL」未啟用車站，不顯示在地圖上
                        return code && code !== "NIL";
                    },
                    pointToLayer: function (feature, latlng) {
                        var props = feature.properties;
                        var staCode = (props.StationCode || props.station_code).toUpperCase();

                        // 自動記錄經緯度對應
                        stationCoords[staCode] = [latlng.lat, latlng.lng];
                        
                        var outerMarker = L.circleMarker(latlng, {
                            radius: 6, color: '#000000', fillColor: '#ffffff', fillOpacity: 1, weight: 2.5,
                            pane: 'stationPane'
                        }).addTo(map);

                        L.circleMarker(latlng, {
                            radius: 2, color: '#ffffff', fillColor: '#ffffff', fillOpacity: 1, weight: 1,
                            pane: 'stationPane'
                        }).addTo(map);

                        stationLayers[staCode] = outerMarker; 
                        return outerMarker; 
                    },
                    onEachFeature: function (feature, layer) {
                        var props = feature.properties;
                        var staName = props["StationName:zh"] || "未知車站";
                        var staCode = props.StationCode || "";
                        
                        if (staName.endsWith("站")) staName = staName.slice(0, -1);

                        layer.bindTooltip(staName, { 
                            permanent: true, direction: 'right', className: 'station-label', offset: [10, 0] 
                        });

                        layer.bindPopup(`<b>${staName} (${staCode})</b><br>暫無實時列車進站`);
                    }
                }).addTo(map);
                
                updateTrainPositions();
                setInterval(updateTrainPositions, 10000);
            }).catch(err => console.error("車站載入錯誤:", err));

        // 5. 實時列車位置動態算法
        function updateTrainPositions() {
            fetch('/api/live')
                .then(res => res.json())
                .then(response => {
                    if (response.status !== "success") return;
                    
                    Object.values(trainMarkers).forEach(marker => map.removeLayer(marker));
                    trainMarkers = {};

                    var trainData = response.data;
                    var uniqueTrains = new Map();
                    
                    trainData.forEach(train => {
                        // 確保只抓荃灣綫
                        if (train.line !== "TWL") return;
                        // 以車站+方向建立唯一 Key 進行去重
                        var uniqueKey = `${train.line}_${train.station.toUpperCase()}_${train.direction}`;
                        
                        if (!uniqueTrains.has(uniqueKey)) {
                            uniqueTrains.set(uniqueKey, train);
                        } else {
                            var existing = uniqueTrains.get(uniqueKey);
                            if (parseInt(train.ttnt) < parseInt(existing.ttnt)) {
                                uniqueTrains.set(uniqueKey, train);
                            }
                        }
                    });

                    var stationSchedules = {};

                    uniqueTrains.forEach(train => {
                        var currentSta = train.station.toUpperCase();
                        var ttnt = parseInt(train.ttnt);
                        var direction = train.direction; 
                        
                        if (!stationSchedules[currentSta]) {
                            stationSchedules[currentSta] = [];
                        }
                        stationSchedules[currentSta].push(train);

                        if (!stationCoords[currentSta]) return; 
                        
                        var targetLatlng = stationCoords[currentSta];
                        var finalLatlng = targetLatlng;
                        
                        var prevSta = getPreviousStation(currentSta, direction);
                        if (prevSta && stationCoords[prevSta]) {
                            var prevLatlng = stationCoords[prevSta];
                            var ratio = 0.5; 
                            if (ttnt === 1) ratio = 0.85;
                            if (ttnt >= 3) ratio = 0.15;
                            
                            var lat = prevLatlng[0] + (targetLatlng[0] - prevLatlng[0]) * ratio;
                            var lng = prevLatlng[1] + (targetLatlng[1] - prevLatlng[1]) * ratio;
                            finalLatlng = [lat, lng];
                        }

                        // 渲染白圈紅芯小原點（大小為車站點的 75% 左右）
                        var trainHtmlIcon = L.divIcon({
                            className: 'train-icon',
                            html: '', 
                            iconSize: [9, 9],
                            iconAnchor: [4.5, 4.5]
                        });

                        var markerId = `${train.line}_${currentSta}_${direction}`;
                        trainMarkers[markerId] = L.marker(finalLatlng, { 
                            icon: trainHtmlIcon,
                            pane: 'trainPane'
                        })
                        .addTo(map)
                        .bindPopup(`<b>目的地:</b> ${train.dest}<br><b>下一站:</b> ${currentSta}<br><b>時間:</b> ${ttnt} 分鐘後到站`);
                    });

                    // 更新車站點擊的 Popup 資訊
                    Object.keys(stationLayers).forEach(staCode => {
                        var marker = stationLayers[staCode];
                        var schedules = stationSchedules[staCode] || [];
                        var tooltip = marker.getTooltip();
                        var staName = tooltip ? tooltip.getContent() : staCode;
                        
                        var popupContent = `<b>${staName} (${staCode})</b><br><hr style="border:0;border-top:1px solid #ccc;margin:5px 0;">`;
                        if (schedules.length === 0) {
                            popupContent += `<span style="color:#888;font-size:12px;">暫無實時列車即將進站</span>`;
                        } else {
                            schedules.forEach(t => {
                                var dirText = t.direction === "UP" ? "往荃灣" : "往中環";
                                popupContent += `<div style="font-size:12px;margin:3px 0;">• <b>${dirText}</b>: <span style="color:#E2231A;font-weight:bold;">${t.ttnt}</span> 分鐘後</div>`;
                            });
                        }
                        marker.setPopupContent(popupContent);
                    });

                });
        }

        const TWL_ORDER = ["CEN", "ADM", "TST", "JOR", "YMT", "MOK", "PRE", "SSP", "CSW", "LCK", "MEF", "LAK", "KWF", "KWH", "TWH", "TSW"];
        function getPreviousStation(currentSta, direction) {
            var index = TWL_ORDER.indexOf(currentSta);
            if (index === -1) return null;
            if (direction === 'UP' && index > 0) return TWL_ORDER[index - 1];
            if (direction === 'DOWN' && index < TWL_ORDER.length - 1) return TWL_ORDER[index + 1];
            return null;
        }
    </script>
</body>
</html>
