<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港鐵實時地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        .title { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: rgba(255,255,255,0.95); padding: 12px 18px; 
            border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            font-size: 19px; font-weight: bold;
        }
        .back-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 10px 16px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2); font-size: 17px;
            text-decoration: none; color: black;
        }
        .leaflet-popup-content {
            font-size: 15.5px !important;
            line-height: 1.6;
            min-width: 180px;
        }
    </style>
</head>
<body>
    <div class="title">🗺️ 港鐵實時地圖</div>
    <a href="/" class="back-btn">← 返回主頁</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.3193, 114.1694], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // ==================== 載入站點 GeoJSON ====================
        fetch('/static/StationLocation_2026_06.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 5,
                            color: "#333333",
                            fillColor: "#ffffff",
                            fillOpacity: 0.9,
                            weight: 3
                        });
                    },
                    onEachFeature: function(feature, layer) {
                        var name = feature.properties["StationName:zh"] || feature.properties.StationName || "未知站";
                        layer.bindPopup(`<b>${name}</b><br>正在載入 ttnt...`);
                        layer.bindTooltip(name, {direction: "top"});
                    }
                }).addTo(map);
            });

        // ==================== 載入荃灣線軌道 GeoJSON ====================
        fetch('/static/Track.TsuenWanLine.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        return {
                            color: "#ed1d24",   // 荃灣線紅色
                            weight: 5,
                            opacity: 0.7
                        };
                    }
                }).addTo(map);
            });

        console.log("地圖 + 路線 + 站點已載入");
    </script>
</body>
</html>
