<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 實時列車地圖 - 訊號閉塞修正版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; background: #ffffff; }
        .nav-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; border: 2px solid #ccc; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; text-decoration: none; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-btn:hover { background: #eee; }
        .station-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #111111; font-weight: bold; text-shadow: 1px 1px 2px #ffffff; font-size: 12px;
        }
        .leaflet-tooltip-left::before, .leaflet-tooltip-right::before,
        .leaflet-tooltip-top::before, .leaflet-tooltip-bottom::before { display: none !important; }

        /* 【修復】常規巡航列車點：移除 transform transition 避免干擾 Leaflet 縮放 */
        .train-container {
            width: 10px; height: 10px; display: flex; align-items: center; justify-content: center;
        }
        .train-dot {
            width: 8px; height: 8px; background-color: #ffffff; border: 2px solid #E2231A; border-radius: 50%;
            box-shadow: 0 0 3px rgba(0,0,0,0.3);
        }

        /* 【修復】延誤閃爍動畫：只針對內層 div 縮放，絕不干擾 Leaflet Marker 外層 */
        .train-dot-delayed {
            width: 8px; height: 8px; background-color: #ffcc00; border: 2px solid #cc9900; border-radius: 50%;
            box-shadow: 0 0 8px #ffcc00;
            animation: mtrTrainPulse 0.8s infinite alternate;
        }
        @keyframes mtrTrainPulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

    <a href="/admin" class="nav-btn">📊 前往數據後台</a>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([22.321, 114.170], 12.5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        map.createPane('trackPane').style.zIndex = 450;   
        map.createPane('stationPane').style.zIndex = 500; 
        map.createPane('trainPane').style.zIndex = 550;   

        var stationCoords = {}; 
        var stationLayers = {}; 
        var trackFeatures = []; 
        var travelTimeConfig = {}; 
        var lastStationState = {}; 
        var activeTrains = {}; 

        // 1. 初始化資料加載
        Promise.all([
            fetch('/路線軌道檔/Track.TsuenWanLine.geojson').then(res => res.json()),
            fetch('/系統基本檔/StationLocation_2026_06.geojson').then(res => res.json()),
            fetch('https://raw.githubusercontent.com/mtrfighter-HK/WhereAreTheIron/main/%E7%B3%BB%E7%B5%B1%E5%9F%BA%E6%9C%AC%E6%AA%94%2FTravelTimeConfig.json').then(res => res.json()).catch(() => null)
        ]).then(([trackData, stationData, timeConfig]) => {

            trackFeatures = trackData.features;
            L.geoJSON(trackData, { style: { color: '#E2231A', weight: 4, opacity: 0.8 }, pane: 'trackPane' }).addTo(map);

            if (timeConfig && timeConfig.travel_times) {
                timeConfig.travel_times.forEach(t => {
                    travelTimeConfig[`${t.from}_${t.to}`] = t.run_time_sec || t.duration_sec || 120; 
                });
            }

            L.geoJSON(stationData, {
                filter: f => (f.properties.StationCode || f.properties.station_code || "") !== "NIL",
                pointToLayer: function (feature, latlng) {
                    var props = feature.properties;
                    var staCode = (props.StationCode || props.station_code).toUpperCase();
                    stationCoords[staCode] = [latlng.lat, latlng.lng];
                    var outerMarker = L.circleMarker(latlng, { radius: 6, color: '#000000', fillColor: '#ffffff', fillOpacity: 1, weight: 2.5, pane: 'stationPane' }).addTo(map);
                    L.circleMarker(latlng, { radius: 2, color: '#ffffff', fillColor: '#ffffff', fillOpacity: 1, weight: 1, pane: 'stationPane' }).addTo(map);
                    stationLayers[staCode] = outerMarker; 
                    return outerMarker; 
                },
                onEachFeature: function (feature, layer) {
                    var props = feature.properties;
                    var staName = props["StationName:zh"] || "未知車站";
                    if (staName.endsWith("站")) staName = staName.slice(0, -1);
                    layer.bindTooltip(staName, { permanent: true, direction: 'right', className: 'station-label', offset: [10, 0] });
                    layer.bindPopup(`<b>${staName}</b><br>等待訊號更新...`);
                }
            }).addTo(map);

            processTrainSchedules();
            setInterval(processTrainSchedules, 10000);

        }).catch(err => console.error("系統初始化失敗:", err));


        // 2. 主事件分析監聽器
        function processTrainSchedules() {
            fetch('/api/live')
                .then(res => res.json())
                .then(response => {
                    if (response.status !== "success") return;
                    var trainData = response.data;

                    var currentGroup = {};
                    var stationSchedules = {};

                    trainData.forEach(train => {
                        if (train.line !== "TWL") return;
                        var currentSta = train.station.toUpperCase();
                        var dir = train.direction;
                        var key = `${currentSta}_${dir}`;

                        if (!stationSchedules[currentSta]) stationSchedules[currentSta] = [];
                        stationSchedules[currentSta].push(train);

                        if (!currentGroup[key] || parseInt(train.ttnt) < parseInt(currentGroup[key].ttnt)) {
                            currentGroup[key] = train; 
                        }
                    });

                    Object.keys(currentGroup).forEach(key => {
                        var currentTrain = currentGroup[key];
                        var lastTrain = lastStationState[key];

                        var currentTtnt = parseInt(currentTrain.ttnt);
                        var currentSta = currentTrain.station.toUpperCase(); 
                        var dir = currentTrain.direction;
                        var prevSta = getPreviousStation(currentSta, dir); 

                        var trainId = `${dir}_${prevSta}_${currentSta}`;

                        if (lastTrain) {
                            var lastTtnt = parseInt(lastTrain.ttnt);

                            // 【發車訊號】
                            if ((lastTtnt === 0 && currentTtnt > 0) || (isTerminus(currentSta, dir) && currentTtnt > lastTtnt)) {
                                if (prevSta) {
                                    clearPreviousBlockTrain(prevSta, dir);
                                    console.log(`🚀 [發車] 區間: ${prevSta} ➔ ${currentSta}`);
                                    launchVirtualTrain(prevSta, currentSta, dir, currentTrain.dest);
                                }
                            }
                        } else {
                            // 【修復 Bug 1】熱身機制收窄判定條件，防止鬼車生成
                            if (prevSta && !activeTrains[trainId]) {
                                // 只有當車次真的剛開出 (ttnt為2或3) 才會注入。如果 ttnt >= 4，代表車子還在更後面的車站，不在此區間生成！
                                if (currentTtnt === 2 || currentTtnt === 3) {
                                    console.log(`⏱️ [熱身同步] 注入行駛區間: ${prevSta} ➔ ${currentSta} (ttnt: ${currentTtnt})`);
                                    launchVirtualTrain(prevSta, currentSta, dir, currentTrain.dest);
                                } else if (isFirstTrackSegment(currentSta, dir) && currentTtnt === 1) {
                                    console.log(`静态月台預生成: ${prevSta}`);
                                    spawnStationTrain(prevSta, currentSta, dir, currentTrain.dest);
                                }
                            }
                        }

                        // 【誤差補償與延誤監聽】
                        if (activeTrains[trainId]) {
                            var runningTrain = activeTrains[trainId];

                            if (currentTtnt === 1 || currentTtnt === 0) {
                                if (!runningTrain.inCompensationZone || runningTrain.isDelayed) {
                                    runningTrain.enterCompensation(runningTrain.ratio); 
                                }
                            } else if (currentTtnt >= 2 && runningTrain.ratio >= 0.90 && !runningTrain.inCompensationZone) {
                                if (!runningTrain.isDelayed) {
                                    runningTrain.triggerDelay();
                                }
                            }
                        }

                        lastStationState[key] = currentTrain;
                    });

                    // 更新月台氣泡
                    Object.keys(stationLayers).forEach(staCode => {
                        var marker = stationLayers[staCode];
                        var schedules = stationSchedules[staCode] || [];
                        var tooltip = marker.getTooltip();
                        var staName = tooltip ? tooltip.getContent() : staCode;

                        var popupContent = `<b>${staName} (${staCode})</b><br><hr style="border:0;border-top:1px solid #ccc;margin:5px 0;">`;
                        if (schedules.length === 0) {
                            popupContent += `<span style="color:#888;font-size:12px;">暫無實時列車即將進站</span>`;
                        } else {
                            schedules.forEach(t => {
                                var dirText = t.direction === "UP" ? "往荃灣" : "往中環";
                                popupContent += `<div style="font-size:12px;margin:3px 0;">• <b>${dirText}</b>: <span style="color:#E2231A;font-weight:bold;">${t.ttnt}</span> 分鐘後</div>`;
                            });
                        }
                        marker.setPopupContent(popupContent);
                    });
                });
        }

        function clearPreviousBlockTrain(currentLaunchStation, direction) {
            var prevPrevSta = getPreviousStation(currentLaunchStation, direction === "UP" ? "DOWN" : "UP"); 
            if (!prevPrevSta) return;
            var oldTrainId = `${direction}_${prevPrevSta}_${currentLaunchStation}`;
            if (activeTrains[oldTrainId]) {
                activeTrains[oldTrainId].destroy();
            }
        }


        // 3. 虛擬列車狀態機類別
        class VirtualTrain {
            constructor(fromSta, toSta, direction, dest, isPreSpawn = false) {
                this.fromSta = fromSta;
                this.toSta = toSta;
                this.direction = direction;
                this.dest = dest;
                this.id = `${direction}_${fromSta}_${toSta}`;
                this.isDelayed = false;

                var geojsonDataDir = (direction === "UP") ? "Up" : "Down";
                this.trackFeature = trackFeatures.find(f => f.properties.direction === geojsonDataDir && f.properties.from === fromSta && f.properties.to === toSta);
                if (!this.trackFeature) return;
                this.coords = this.trackFeature.geometry.coordinates;

                var timeKey = `${fromSta}_${toSta}`;
                this.totalDuration = (travelTimeConfig[timeKey] || 110) * 1000; 

                this.startTime = Date.now();
                this.ratio = 0.0;
                this.inCompensationZone = false;
                this.timer = null;

                // 【修復 Bug 2】使用 HTML 包裹內層 div 圓點，確保縮放時定位完全由 Leaflet 接管，絕不飄移
                this.iconElement = L.divIcon({ 
                    className: 'train-container', 
                    html: '<div class="train-dot" id="dot_' + this.id + '"></div>', 
                    iconSize: [10, 10], 
                    iconAnchor: [5, 5] 
                });

                this.marker = L.marker([this.coords[0][1], this.coords[0][0]], { icon: this.iconElement, pane: 'trainPane' }).addTo(map);
                this.updatePopupText("自動巡航中");

                if (!isPreSpawn) {
                    this.startCruise();
                } else {
                    this.updatePopupText("始發月台待命");
                }
            }

            updatePopupText(statusHtml) {
                var delayNotice = this.isDelayed ? `<br><span style="color:orange;font-weight:bold;">⚠️ 列車稍為延遲</span>` : '';
                this.marker.bindPopup(`<b>目的地:</b> ${this.dest}<br><b>區間:</b> ${this.fromSta} ➔ ${this.toSta}<br><b>狀態:</b> ${statusHtml}${delayNotice}`);
            }

            startCruise() {
                if (this.timer) clearInterval(this.timer);
                this.isDelayed = false;
                this.startTime = Date.now();

                this.timer = setInterval(() => {
                    var elapsed = Date.now() - this.startTime;
                    var currentProgress = elapsed / this.totalDuration;
                    this.ratio = Math.min(0.90, currentProgress);

                    var latlng = interpolateAlongLineString(this.coords, this.ratio);
                    if (latlng) this.marker.setLatLng(latlng);

                    if (this.ratio >= 0.90 && !this.inCompensationZone && !this.isDelayed) {
                        this.updatePopupText("接近車站，調速等待中");
                    }
                }, 1000);
            }

            // ⚠️ 修正延誤觸發：只改變內層 HTML 樣式，地圖縮放時絕不留喺原位
            triggerDelay() {
                this.isDelayed = true;
                if (this.timer) clearInterval(this.timer); 

                var innerDot = document.getElementById('dot_' + this.id);
                if (innerDot) {
                    innerDot.className = 'train-dot-delayed'; // 激活會縮放閃爍的內層黃點
                }
                this.updatePopupText("<span style='color:orange;font-weight:bold;'>信號燈紅燈等待中</span>");
            }

            enterCompensation(startRatio = 0.90) {
                this.inCompensationZone = true;
                this.isDelayed = false;
                if (this.timer) clearInterval(this.timer);

                // 恢復為普通紅點
                var innerDot = document.getElementById('dot_' + this.id);
                if (innerDot) {
                    innerDot.className = 'train-dot';
                }

                this.ratio = startRatio;
                var compStartTime = Date.now();
                var compDuration = 10000; 

                this.updatePopupText("正在減速進站...");

                this.timer = setInterval(() => {
                    var elapsed = Date.now() - compStartTime;
                    var compProgress = elapsed / compDuration; 

                    this.ratio = startRatio + (1.0 - startRatio) * compProgress;

                    if (this.ratio >= 1.0) {
                        clearInterval(this.timer);
                        this.marker.setLatLng([this.coords[this.coords.length-1][1], this.coords[this.coords.length-1][0]]);
                        this.arrive(); 
                    } else {
                        var latlng = interpolateAlongLineString(this.coords, this.ratio);
                        if (latlng) this.marker.setLatLng(latlng);
                    }
                }, 200); 
            }

            arrive() {
                this.updatePopupText("<span style='color:#E2231A;font-weight:bold;'>列車已進站 / 正在上落客</span>");
                if (isTerminus(this.toSta, this.direction)) {
                    setTimeout(() => { this.destroy(); }, 30000);
                }
            }

            destroy() {
                if (this.timer) clearInterval(this.timer);
                map.removeLayer(this.marker);
                delete activeTrains[this.id];
            }
        }

        // 工具組件
        function launchVirtualTrain(fromSta, toSta, dir, dest) {
            var trainId = `${dir}_${fromSta}_${toSta}`;
            if (activeTrains[trainId] && activeTrains[trainId].ratio === 0) {
                activeTrains[trainId].startCruise();
                return;
            }
            activeTrains[trainId] = new VirtualTrain(fromSta, toSta, dir, dest, false);
        }

        function spawnStationTrain(fromSta, toSta, dir, dest) {
            var trainId = `${dir}_${fromSta}_${toSta}`;
            if (!activeTrains[trainId]) {
                activeTrains[trainId] = new VirtualTrain(fromSta, toSta, dir, dest, true);
            }
        }

        const TWL_ORDER = ["CEN", "ADM", "TST", "JOR", "YMT", "MOK", "PRE", "SSP", "CSW", "LCK", "MEF", "LAK", "KWF", "KWH", "TWH", "TSW"];

        function getPreviousStation(nextSta, direction) {
            var index = TWL_ORDER.indexOf(nextSta);
            if (index === -1) return null;
            if (direction === 'UP') { 
                if (index > 0) return TWL_ORDER[index - 1];
            }
            if (direction === 'DOWN') { 
                if (index < TWL_ORDER.length - 1) return TWL_ORDER[index + 1];
            }
            return null;
        }

        function isFirstTrackSegment(nextSta, dir) {
            if (dir === "UP" && nextSta === "ADM") return true; 
            if (dir === "DOWN" && nextSta === "TWH") return true; 
            return false;
        }

        function isTerminus(sta, dir) {
            return (dir === "UP" && sta === "TSW") || (dir === "DOWN" && sta === "CEN");
        }

        function interpolateAlongLineString(coords, ratio) {
            if (!coords || coords.length === 0) return null;
            if (coords.length === 1) return [coords[0][1], coords[0][0]];
            var targetIndex = Math.floor((coords.length - 1) * ratio);
            var nextIndex = targetIndex + 1;
            if (nextIndex >= coords.length) return [coords[coords.length - 1][1], coords[coords.length - 1][0]];
            var p1 = coords[targetIndex];
            var p2 = coords[nextIndex];
            var segmentRatio = ((coords.length - 1) * ratio) - targetIndex;
            return [p1[1] + (p2[1] - p1[1]) * segmentRatio, p1[0] + (p2[0] - p1[0]) * segmentRatio]; 
        }
    </script>
</body>
</html>
